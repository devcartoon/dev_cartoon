<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 ديف كرتون - منصة الكرتون الاحترافية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🎬</span>
                <div class="logo-text">
                    <span class="main">ديف <span>كرتون</span></span>
                    <span class="sub">🎯 منصة الكرتون المفضلة</span>
                </div>
            </div>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" title="تبديل الوضع">🌙</button>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 ابحث عن كرتون..." />
                    <button id="searchBtn">بحث</button>
                </div>
            </div>
        </header>

        <!-- ===== CARTOON GRID ===== -->
        <div class="cartoon-grid" id="cartoonGrid">
            <!-- سيتم إدراج الكرتونات بواسطة JavaScript -->
        </div>

        <!-- ===== FOOTER ===== -->
        <footer class="footer">
            <p>© 2026 ديف كرتون - جميع الحقوق محفوظة</p>
            <div class="footer-links">
                <a href="#" onclick="showToast('info', '📧 للتواصل: dev@cartoon.com')">تواصل معنا</a>
                <a href="#" onclick="showToast('info', '📖 الإصدار 3.0 - منصة الكرتون الاحترافية')">عن المنصة</a>
                <a href="#" onclick="showToast('info', '🔄 يتم التحديث عبر بوت تليجرام')">تحديث المحتوى</a>
            </div>
        </footer>
    </div>

    <!-- ===== TOAST NOTIFICATIONS ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== VIDEO PLAYER ===== -->
    <div class="video-player-container" id="videoPlayer">
        <div class="video-player-wrapper">
            <button class="close-player" id="closePlayer">✕</button>
            <div class="player-container">
                <iframe id="playerFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="player-info" id="playerInfo">
                <span id="playerTitle">🎬 تشغيل الفيديو</span>
            </div>
        </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script src="script.js"></script>
</body>
</html>
